<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- گرادینت اختصاصی هماهنگ با تم غروب ساحلی پروژه -->
    <linearGradient id="sunsetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
  </defs>

  <!-- پس‌زمینه دایره‌ای شیک -->
  <rect width="32" height="32" rx="8" fill="url(#sunsetGrad)" />

  <!-- طرح مینیمال چمدان مسافرتی و خورشید در حال طلوع/غروب -->
  <!-- دسته چمدان -->
  <path d="M13 11V9C13 8.44772 13.4477 8 14 8H18C18.5523 8 19 8.44772 19 9V11" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  <!-- بدنه چمدان -->
  <rect x="10" y="11" width="12" height="10" rx="2" fill="#ffffff" />
  <!-- جزئیات روی چمدان (خطوط نمادین سفر) -->
  <line x1="13" y1="14" x2="19" y2="14" stroke="#0f766e" stroke-width="1.5" stroke-linecap="round" />
  <line x1="13" y1="17" x2="17" y2="17" stroke="#0f766e" stroke-width="1.5" stroke-linecap="round" />
  
  <!-- خورشید کوچک در گوشه به عنوان نماد جزیره و سفر -->
  <circle cx="23" cy="9" r="2" fill="#f97316" />
</svg>
